services:
  memdb:
    build:
      context: .
    image: memdb:local
    stdin_open: true
    tty: true
    volumes:
      - memdb-data:/data

  memdb-server:
    build:
      context: .
    image: memdb:local
    entrypoint: ["python", "-m", "memdb.server", "--config", "/etc/memdb/memdb.toml"]
    ports:
      - "127.0.0.1:7654:7654"
    volumes:
      - memdb-data:/data

volumes:
  memdb-data:
